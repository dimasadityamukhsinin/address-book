<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Address Book</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Manrope', 'system-ui', 'sans-serif'],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="min-h-screen bg-gradient-to-b from-slate-50 via-slate-50 to-slate-100 font-sans text-slate-900"
  >
    <main class="mx-auto max-w-6xl px-6 py-10">
      <header class="mb-8 flex flex-wrap items-center justify-between gap-4">
        <div>
          <p class="text-2xl font-semibold">Address Book</p>
        </div>
      </header>

      <section
        id="contact-form-section"
        class="mb-8 hidden rounded-lg border border-slate-200 bg-white p-6 shadow-sm"
      >
        <div class="mb-5 flex flex-wrap items-center justify-between gap-3">
          <div>
            <p id="form-title" class="text-lg font-semibold">Tambah Kontak</p>
          </div>
          <button
            id="btn-cancel-contact"
            class="rounded-md border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-900 shadow-sm transition hover:bg-slate-100"
            type="button"
          >
            Batal
          </button>
        </div>
        <form id="contact-form" class="space-y-4">
          <div class="grid gap-4 md:grid-cols-2">
            <label class="space-y-2 text-sm font-medium">
              Nama
              <input
                id="contact-name"
                class="w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200"
                placeholder="Nama lengkap"
                type="text"
              />
            </label>
            <label class="space-y-2 text-sm font-medium">
              Email
              <input
                id="contact-email"
                class="w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200"
                placeholder="nama@email.com"
                type="email"
              />
            </label>
            <div class="space-y-2 text-sm font-medium">
              <div class="flex items-center justify-between">
                <span>Telepon</span>
                <button
                  id="btn-add-phone"
                  class="rounded-md border border-slate-200 bg-white px-2.5 py-1 text-xs font-medium text-slate-900 shadow-sm transition hover:bg-slate-100"
                  type="button"
                >
                  + Tambah
                </button>
              </div>
              <div id="phones-container" class="space-y-2"></div>
            </div>
            <div class="space-y-2 text-sm font-medium">
              <div class="flex items-center justify-between">
                <span>Alamat</span>
                <button
                  id="btn-add-address"
                  class="rounded-md border border-slate-200 bg-white px-2.5 py-1 text-xs font-medium text-slate-900 shadow-sm transition hover:bg-slate-100"
                  type="button"
                >
                  + Tambah
                </button>
              </div>
              <div id="addresses-container" class="space-y-2"></div>
            </div>
            <label class="space-y-2 text-sm font-medium">
              Group
              <select
                id="contact-group"
                class="w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200"
              ></select>
            </label>
            <label class="flex items-center gap-2 text-sm font-medium">
              <input
                id="contact-favorite"
                class="h-4 w-4 rounded border border-slate-200 text-slate-900 focus:ring-slate-200"
                type="checkbox"
              />
              Tandai sebagai favorit
            </label>
          </div>
          <p id="form-error" class="text-sm text-rose-600"></p>
          <div class="flex flex-wrap items-center gap-2">
            <button
              id="btn-save-contact"
              class="rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white shadow-sm transition hover:opacity-90"
              type="submit"
            >
              Simpan
            </button>
          </div>
        </form>
      </section>

      <section class="flex flex-col gap-6 lg:flex-row">
        <aside id="group-sidebar" class="w-full lg:w-64">
          <div class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm font-semibold">Groups</p>
                <p class="text-xs text-slate-500">Filter kontak</p>
              </div>
              <span
                id="group-count"
                class="rounded-full bg-slate-100 px-2.5 py-1 text-[11px] font-semibold text-slate-500"
              >
                0
              </span>
            </div>
            <button
              type="button"
              data-filter="all"
              class="mt-3 flex w-full items-center justify-between rounded-md border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-900 shadow-sm transition hover:bg-slate-100"
            >
              Semua Kontak
              <span class="text-xs text-slate-500">Reset</span>
            </button>
            <button
              type="button"
              data-filter="favorite"
              class="mt-2 flex w-full items-center justify-between rounded-md border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-900 shadow-sm transition hover:bg-slate-100"
            >
              Favorit
              <span class="text-xs text-slate-500">★</span>
            </button>
            <form id="group-form" class="mt-3 flex items-center gap-2">
              <input
                id="group-name"
                class="min-w-0 flex-1 rounded-md border border-slate-200 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200"
                placeholder="Nama group"
                type="text"
              />
              <button
                class="shrink-0 whitespace-nowrap rounded-md border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-900 shadow-sm transition hover:bg-slate-100"
                type="submit"
              >
                Tambah
              </button>
            </form>
            <ul id="group-list" class="mt-4 space-y-2 text-sm"></ul>
          </div>
        </aside>

        <div class="flex-1 space-y-4">
          <div class="flex flex-wrap items-center justify-between gap-3">
            <div class="relative w-full max-w-xs">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">
                ⌕
              </span>
              <input
                id="search-input"
                class="w-full rounded-md border border-slate-200 bg-white py-2 pl-9 pr-3 text-sm text-slate-900 shadow-sm focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200"
                placeholder="Cari nama, email, group"
                type="search"
              />
            </div>
            <button
              id="btn-add-contact"
              class="rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white shadow-sm transition hover:opacity-90"
              type="button"
            >
              Tambah Kontak
            </button>
          </div>

          <section class="rounded-lg border border-slate-200 bg-white shadow-sm">
            <div class="overflow-x-auto">
              <table
                id="table-address-book"
                class="w-full text-sm [&_th]:px-4 [&_th]:py-3 [&_th]:font-medium [&_td]:px-4 [&_td]:py-3 [&_tbody_tr:hover]:bg-slate-100/60"
              >
                <thead>
                  <tr
                    class="border-b border-slate-200 text-left text-xs uppercase tracking-wider text-slate-500"
                  >
                    <th>Nama</th>
                    <th>Email</th>
                    <th>Telepon</th>
                    <th>Alamat</th>
                    <th>Group</th>
                    <th>Favorit</th>
                    <th>Aksi</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-slate-200 text-slate-900"></tbody>
              </table>
            </div>
            <div
              id="empty-state"
              class="border-t border-slate-200 px-4 py-3 text-sm text-slate-500"
            >
              Belum ada kontak.
            </div>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="/scripts/main.js"></script>
  </body>
</html>
